name: Envoyer liste complète Discord

on:
  workflow_dispatch:

jobs:
  send-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Envoyer la liste complète
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const content = fs.readFileSync('index.html', 'utf8');
          const matches = [...content.matchAll(/\{nom:"([^"]+)"[^}]*streamer:"([^"]+)"/g)];
          const players = matches.map(m => ({ nom: m[1], streamer: m[2] }));

          function sendMessage(content) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ content });
              const options = {
                hostname: 'discord.com',
                path: `/api/v10/channels/${process.env.DISCORD_CHANNEL_ID}/messages`,
                method: 'POST',
                headers: {
                  'Authorization': `Bot ${process.env.DISCORD_BOT_TOKEN}`,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            const lines = players.map(p => `**${p.nom}** — ${p.streamer}`).join('\n');
            const chunks = [];
            let current = `📋 **Liste complète des ${players.length} personnages :**\n\n`;
            for (const line of lines.split('\n')) {
              if ((current + line + '\n').length > 1900) {
                chunks.push(current);
                current = '';
              }
              current += line + '\n';
            }
            if (current) chunks.push(current);
            for (const chunk of chunks) {
              await sendMessage(chunk);
              await new Promise(r => setTimeout(r, 500));
            }
            console.log('Liste envoyée !');
          }

          main().catch(console.error);
          EOF
